# Kotlin
kotlin.code.style=official
kotlin.incremental=true
kotlin.parallel=true
kotlin.daemon=true
kapt.incremental.apt=true
kotlin.experimental.useK2=true
kotlin.compiler.execution.strategy=daemon
kotlin.daemon.jvmargs=-Xms2G -Xmx4G -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseStringDeduplication

# Gradle
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.configuration-cache=true
org.gradle.jvmargs=-Xms2G -Xmx4G -XX:+UseG1GC -XX:MaxMetaspaceSize=1024m
org.gradle.daemon.idletimeout=600000

# Minestom
minestom.server.memory=8192